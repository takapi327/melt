name: Deploy Docs

on:
  push:
    branches: [refactor/2026-05-Split-examples]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Generate static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java (corretto@17)
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 17
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish monorepo modules locally
        run: >-
          sbt
          "compiler-cssJVM/publishLocal; compiler-cssJS/publishLocal;
          compilerJVM/publishLocal; compilerJS/publishLocal;
          runtimeJVM/publishLocal; runtimeJS/publishLocal;
          codegenJVM/publishLocal; codegenJS/publishLocal;
          meltkitJVM/publishLocal; meltkitJS/publishLocal;
          meltkit-adapter-browser/publishLocal;
          sbt-melt/publishLocal; sbt-meltkit/publishLocal"

      - name: Build vite-plugin
        run: pnpm --filter @melt/vite-plugin build

      - name: Generate Vite inputs (includes fullLinkJS)
        run: sbt "docsJVM/meltkitViteInputGenerate"
        working-directory: docs

      - name: Vite build
        run: pnpm exec vite build
        working-directory: docs
        env:
          MELT_BASE_PATH: /melt/

      - name: SSG generate
        run: sbt "docsJVM/runMain docs.generate"
        working-directory: docs
        env:
          MELT_BASE_PATH: /melt/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/jvm/docs-dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
