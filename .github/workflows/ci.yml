name: Continuous Integration

on:
  pull_request:
    branches: ['**']
  push:
    branches: ['**']
    tags: [v*]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    name: Build and Test
    strategy:
      matrix:
        os: [ubuntu-latest]
        scala: [3.3.7, 3.8.3]
        java: [corretto@17, corretto@21, corretto@25]
        project: [meltcJVM, meltcJS, meltcNative, codegenJVM, codegenJS, meltkitJVM, meltkitJS, meltkit-adapter-http4sJVM, meltkit-adapter-http4sJS]
        exclude:
          - project: meltcJS
            java: corretto@21
          - project: meltcJS
            java: corretto@25
          - project: meltcNative
            java: corretto@21
          - project: meltcNative
            java: corretto@25
          - project: codegenJS
            java: corretto@21
          - project: codegenJS
            java: corretto@25
          - project: meltkitJS
            java: corretto@21
          - project: meltkitJS
            java: corretto@25
          - project: meltkit-adapter-http4sJS
            java: corretto@21
          - project: meltkit-adapter-http4sJS
            java: corretto@25
          - java: corretto@21
            scala: 3.8.3
          - java: corretto@25
            scala: 3.8.3
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout current branch (full)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java (corretto@17)
        if: matrix.java == 'corretto@17'
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 17
          cache: sbt

      - name: Setup Java (corretto@21)
        if: matrix.java == 'corretto@21'
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21
          cache: sbt

      - name: Setup Java (corretto@25)
        if: matrix.java == 'corretto@25'
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 25
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Install Scala Native dependencies
        if: matrix.project == 'meltcNative'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libstdc++-12-dev

      - name: Check that workflows are up to date
        run: sbt '++ ${{ matrix.scala }}' githubWorkflowCheck

      - name: Check headers and formatting
        if: matrix.java == 'corretto@17'
        run: sbt '++ ${{ matrix.scala }}' 'project ${{ matrix.project }}' headerCheckAll scalafmtCheckAll 'project /' scalafmtSbtCheck

      - name: scalaJSLink
        if: contains('meltcJS codegenJS meltkitJS meltkit-adapter-http4sJS', matrix.project)
        run: sbt '++ ${{ matrix.scala }}' 'project ${{ matrix.project }}' Test/scalaJSLinkerResult

      - name: nativeLink
        if: matrix.project == 'meltcNative'
        run: sbt '++ ${{ matrix.scala }}' 'project ${{ matrix.project }}' Test/nativeLink

      - name: Test
        run: sbt '++ ${{ matrix.scala }}' 'project ${{ matrix.project }}' test

      - name: Make target directories
        if: github.event_name != 'pull_request' && (startsWith(github.ref, 'refs/tags/v'))
        run: mkdir -p modules/meltc/jvm/target modules/meltc/js/target modules/meltc/native/target modules/sbt-meltc/target modules/runtime/target modules/melt-testing/target editors/language-server/target target project/target

      - name: Compress target directories
        if: github.event_name != 'pull_request' && (startsWith(github.ref, 'refs/tags/v'))
        run: tar cf targets.tar modules/meltc/jvm/target modules/meltc/js/target modules/meltc/native/target modules/sbt-meltc/target modules/runtime/target modules/melt-testing/target editors/language-server/target target project/target

      - name: Upload target directories
        if: github.event_name != 'pull_request' && (startsWith(github.ref, 'refs/tags/v'))
        uses: actions/upload-artifact@v4
        with:
          name: target-${{ matrix.os }}-${{ matrix.java }}-${{ matrix.scala }}-${{ matrix.project }}
          path: targets.tar

  publish:
    name: Publish Artifacts
    needs: [build]
    if: github.event_name != 'pull_request' && (startsWith(github.ref, 'refs/tags/v'))
    strategy:
      matrix:
        os: [ubuntu-latest]
        scala: [3.3.7]
        java: [corretto@17]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout current branch (full)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java (corretto@17)
        if: matrix.java == 'corretto@17'
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 17
          cache: sbt

      - name: Setup Java (corretto@21)
        if: matrix.java == 'corretto@21'
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21
          cache: sbt

      - name: Setup Java (corretto@25)
        if: matrix.java == 'corretto@25'
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 25
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Download target directories (3.3.7, meltcJVM)
        uses: actions/download-artifact@v4
        with:
          name: target-${{ matrix.os }}-${{ matrix.java }}-3.3.7-meltcJVM

      - name: Inflate target directories (3.3.7, meltcJVM)
        run: |
          tar xf targets.tar
          rm targets.tar

      - name: Download target directories (3.3.7, meltcJS)
        uses: actions/download-artifact@v4
        with:
          name: target-${{ matrix.os }}-${{ matrix.java }}-3.3.7-meltcJS

      - name: Inflate target directories (3.3.7, meltcJS)
        run: |
          tar xf targets.tar
          rm targets.tar

      - name: Download target directories (3.3.7, meltcNative)
        uses: actions/download-artifact@v4
        with:
          name: target-${{ matrix.os }}-${{ matrix.java }}-3.3.7-meltcNative

      - name: Inflate target directories (3.3.7, meltcNative)
        run: |
          tar xf targets.tar
          rm targets.tar

      - name: Publish project
        run: sbt +publish

  sbtScripted:
    name: sbt scripted
    strategy:
      matrix:
        os: [ubuntu-latest]
        scala: [3.3.7]
        java: [corretto@17, corretto@21]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout current branch (full)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java (corretto@17)
        if: matrix.java == 'corretto@17'
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 17
          cache: sbt

      - name: Setup Java (corretto@21)
        if: matrix.java == 'corretto@21'
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21
          cache: sbt

      - name: Setup Java (corretto@25)
        if: matrix.java == 'corretto@25'
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 25
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: sbt publishLocal
        run: sbt publishLocal

      - name: sbt scripted
        run: sbt scripted
