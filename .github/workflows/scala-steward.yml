# Scala Steward opens PRs to update Scala / sbt dependencies and Scala itself.
#
# Dependabot does not understand sbt builds, so Scala dependencies (http4s,
# circe, undertow, lsp4j, munit, sass-embedded-host, …) are kept current here.
#
# Requirements:
#   - A token with permission to push branches and open PRs must be provided as
#     the `SCALA_STEWARD_TOKEN` repository secret. A fine-grained PAT or a
#     dedicated GitHub App token is recommended (the default GITHUB_TOKEN cannot
#     trigger CI on the PRs it creates). Until the secret is set, this workflow
#     is inert — the scheduled run simply fails on the missing secret.
name: Scala Steward

on:
  schedule:
    # Mondays at 07:00 UTC
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  scala-steward:
    runs-on: ubuntu-latest
    steps:
      - name: Run Scala Steward
        uses: scala-steward-org/scala-steward-action@v2
        with:
          github-token: ${{ secrets.SCALA_STEWARD_TOKEN }}
