# Phase 0: syntactic rules only (no SemanticDB required)
# Semantic rules such as RemoveUnused / OrganizeImports will be added in Phase 7 and beyond.

rules = [
  DisableSyntax,
  NoValInForComprehension,
]

DisableSyntax.noVars    = true
DisableSyntax.noThrows  = false
DisableSyntax.noNulls   = true
DisableSyntax.noReturns = false
